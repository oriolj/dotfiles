background_opacity 0.8
window_padding_width 10 12

# Reduce redraw frequency to lower compositor (niri) CPU.
# repaint_delay: ms between frames (default 10 ~100fps). Higher = fewer recomposites.
# Monitor is 60Hz, so values <=16 don't help (niri is already 60Hz-bound);
# 33 (~30fps) measured niri ~15%->10% while a streaming TUI is focused.
repaint_delay 33
# input_delay: batch rapid program output (e.g. streaming TUIs/spinners) into fewer redraws.
input_delay 5
# Stop the blinking cursor from damaging the window ~2x/sec forever.
cursor_blink_interval 0
# Trim per-frame Wayland input-method overhead.
wayland_enable_ime no

tab_bar_edge top

# open new tabs/windows in the current tab's working directory
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+enter new_window_with_cwd

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
