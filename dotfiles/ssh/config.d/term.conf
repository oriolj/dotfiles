# Fall back to xterm-256color when sshing from kitty or ghostty. Most
# remote hosts don't ship xterm-kitty/xterm-ghostty terminfo, which makes
# tmux (and other tput-using tools) refuse to start. The richer terminfo
# is preserved when going through `kitten ssh` or ghostty's
# shell-integration ssh-terminfo, which install it on the remote first.
# TERM is always accepted by sshd (required by the SSH protocol), so no
# AcceptEnv tweak is needed on any server.
Match exec "test \"$TERM\" = xterm-kitty -o \"$TERM\" = xterm-ghostty"
    SetEnv TERM=xterm-256color
