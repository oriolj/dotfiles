
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
#$fileManager = dolphin
$fileManager = nautilus
$menu = fuzzel


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/gen-ssh-desktops.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_special = 0.7

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    # Vertical slide so workspaces feel like a vertical stack — the scrolling
    # layout already owns the horizontal axis (column tape inside a workspace).
    animation = workspaces, 1, 2.5, easeOutQuint, slidevert
    animation = workspacesIn, 1, 2.5, easeOutQuint, slidevert
    animation = workspacesOut, 1, 2.5, easeOutQuint, slidevert
    animation = specialWorkspace, 1, 2, easeOutQuint, fade
    animation = specialWorkspaceIn, 1, 2, easeOutQuint, fade
    animation = specialWorkspaceOut, 1, 2, easeOutQuint, fade
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Scrolling-Layout/ for more
# Built-in in Hyprland 0.54+ (the old `hyprscrolling` plugin was migrated into core).
# See ~/Sync/docs/claude_workdirs/hyprland/niri.md for full bind/dispatcher reference.
scrolling {
    # Default fraction of screen width a new column takes.
    column_width = 0.5
    # Cycled by SUPER+W (layoutmsg, colresize +conf).
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    # Auto-maximize when only one column exists in the workspace.
    fullscreen_on_one_column = false
    # 0 = center focused column on screen; 1 = scroll only as much as needed to keep it visible.
    focus_fit_method = 0
    # Auto-scroll viewport when focus moves off-screen.
    follow_focus = true
}

# Kept for completeness; only takes effect if `general:layout` is changed back.
dwindle {
    pseudotile = true
    preserve_split = true
}
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    # Silence two startup warnings that are false positives when launching via uwsm + greetd:
    #   - XDG_CURRENT_DESKTOP ends up as "hyprland:Hyprland" (logind prepends the session filename), not a single value
    #   - Hyprland's "not started via start-hyprland" check isn't uwsm-aware; uwsm is the alternative launcher
    disable_xdg_env_checks = true
    disable_watchdog_warning = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = compose:rctrl
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = yes
        clickfinger_behavior = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#gestures
gestures {
    # 3-finger vertical swipe switches workspaces (matches the slidevert animation
    # and keeps the metaphor consistent with the scrolling layout: horizontal axis
    # belongs to the column tape, vertical axis switches workspace stacks).
    gesture = 3, vertical, workspace
}

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, submap, exit-confirm

submap = exit-confirm
bind = , Return, exit,
bind = , Escape, submap, reset
bind = , Q, submap, reset
bind = $mainMod, M, submap, reset
submap = reset
bind = $mainMod, E, exec, $fileManager
bind = $mainMod CTRL, T, exec, ghostty --class=com.mitchellh.ghostty.btop -e btop
bind = $mainMod, N, exec, makoctl dismiss
bind = $mainMod SHIFT, N, exec, brave --profile-directory=Default --app="https://keep.google.com" --ozone-platform=wayland
bind = $mainMod CTRL, N, exec, makoctl mode -t do-not-disturb && pkill -RTMIN+9 waybar
bind = $mainMod ALT, N, exec, notification-activate
bind = $mainMod CTRL, I, exec, ~/.config/waybar/scripts/idle-toggle.sh
bind = $mainMod, T, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, TAB, exec, ~/.config/hypr/scripts/window-switcher.sh
bind = $mainMod, SPACE, exec, $menu

# fuzzel-driven menus
bind = $mainMod, ESCAPE, exec, ~/.config/hypr/scripts/power-menu.sh
bind = $mainMod, period, exec, ~/.config/hypr/scripts/emoji-picker.sh
bind = $mainMod, TAB, exec, ~/.config/hypr/scripts/window-switcher.sh
bind = $mainMod SHIFT, SPACE, exec, ~/.local/bin/raffi
bind = $mainMod, equal, exec, ~/.config/hypr/scripts/calc.sh
bind = $mainMod SHIFT, H, exec, ~/.config/hypr/scripts/ssh.sh

# Move focus with mainMod + arrow keys (routes through layout — works in scrolling)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move active column / window in scrolling layout (was: swapwindow under dwindle).
# l/r move the focused column horizontally; u/d move the window within its column stack.
bind = $mainMod SHIFT, left,  layoutmsg, move -col
bind = $mainMod SHIFT, right, layoutmsg, move +col
bind = $mainMod SHIFT, up,    layoutmsg, movewindowto u
bind = $mainMod SHIFT, down,  layoutmsg, movewindowto d

# Resize active column / window with mainMod + CTRL + arrow keys (repeats on hold)
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# === Scrolling layout / niri-style bindings (see niri.md for context) ===
# vim aliases for focus (niri Mod+H/J/K/L). SUPER+L is hyprlock — no L alias.
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u

# Cycle preset column widths (niri Mod+R). Launcher lives on Mod+SPACE / Mod+SHIFT+SPACE.
bind = $mainMod, R, layoutmsg, colresize +conf
bind = $mainMod SHIFT, R, layoutmsg, colresize -conf
# Fine-grained column width (niri Mod+- / Mod+=).
binde = $mainMod, minus, layoutmsg, colresize -0.05

# Maximize / fit columns. Mod+F stays as fullscreen; use sub-mods for scrolling fit.
bind = $mainMod SHIFT, F, layoutmsg, fit active   # fit focused column to full width
bind = $mainMod CTRL,  F, layoutmsg, fit visible  # fit all visible columns evenly

# Promote: replaces removed dwindle pseudo bind. In scrolling, "promote" floats the
# focused window out of its column so it spans the full column width.
bind = $mainMod, P, layoutmsg, promote

# Move column to a different position in the row (niri Mod+Ctrl+arrow uses brackets here
# because Mod+Ctrl+arrow is reserved for resize).
bind = $mainMod, bracketleft,  layoutmsg, move -col
bind = $mainMod, bracketright, layoutmsg, move +col

# Consume / expel a window between columns (niri Mod+, / Mod+. — Mod+. is emoji-picker).
bind = $mainMod SHIFT, comma,  layoutmsg, movewindowto l
bind = $mainMod SHIFT, period, layoutmsg, movewindowto r

# Toggle floating (niri Mod+V; alias for existing Mod+T).
bind = $mainMod, V, togglefloating

# Snap viewport to first / last column (niri Mod+Home / Mod+End).
bind = $mainMod, home, layoutmsg, fit tobeg
bind = $mainMod, end,  layoutmsg, fit toend

# Prev / next workspace via Page keys (niri Mod+Page_Up/Down).
bind = $mainMod, page_up,   workspace, e-1
bind = $mainMod, page_down, workspace, e+1

# App launchers (native)
bind = $mainMod SHIFT, Return, exec, brave --ozone-platform=wayland
bind = $mainMod SHIFT, O, exec, obsidian
bind = $mainMod SHIFT, G, exec, signal-desktop --password-store=gnome-libsecret

# Web apps (brave --app, decoration-less window)
bind = $mainMod SHIFT, A, exec, brave --profile-directory=Default --app="https://gemini.google.com" --ozone-platform=wayland
bind = $mainMod SHIFT ALT, A, exec, brave --profile-directory=Default --app="https://chatgpt.com" --ozone-platform=wayland
bind = $mainMod SHIFT, C, exec, brave --profile-directory=Default --app="https://calendar.google.com" --ozone-platform=wayland

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Show keybinding cheatsheet (floating terminal with glow)
bind = $mainMod, K, exec, ghostty --class=com.mitchellh.ghostty.help -e glow -p /home/oriol/Sync/docs/claude_workdirs/hyprland/shortcuts_hyprland.md

# Window rules for the help dialog
windowrule = match:class com.mitchellh.ghostty.help, float on, center on, size 1000 750

# Float impala/bluetui popups launched from waybar network/bluetooth modules
# NOTE: ghostty 1.3+ requires reverse-DNS class names, silently ignores others
windowrule = match:class com.mitchellh.ghostty.impala, float on, center on, size 900 600
windowrule = match:class com.mitchellh.ghostty.bluetui, float on, center on, size 900 600
windowrule = match:class com.mitchellh.ghostty.tplink, float on, center on
windowrule = match:class com.mitchellh.ghostty.toggl, float on, center on, size 900 600

# Remote shell sessions (ssh/mosh via host launcher or ssh-*.desktop entries):
# sharp corners + slight dim to make it unmistakable you're on a remote host.
# Terminal itself also paints a dark-red bg (#2a1010). bordercolor/bordersize
# aren't valid windowrule fields in 0.54.x — use rounding+opacity.
# Both classes covered: ghostty.remote (legacy/SUPER+SHIFT+H launcher) and
# kitty-remote-prod (auto-generated ssh-*.desktop entries).
windowrule = rounding 0, match:class com.mitchellh.ghostty.remote
windowrule = opacity 0.97 0.92, match:class com.mitchellh.ghostty.remote
windowrule = rounding 0, match:class kitty-remote-prod
windowrule = opacity 0.97 0.92, match:class kitty-remote-prod

# Floating-window tag preset (Omarchy-style): tag classes below, get float+center+size for free
windowrule = float on, match:tag floating-window
windowrule = center on, match:tag floating-window
windowrule = size 875 600, match:tag floating-window

windowrule = tag +floating-window, match:class (org.gnome.Calculator|imv|mpv|org.gnome.NautilusPreviewer|org.gnome.Evince|com.mitchellh.ghostty.btop|com.mitchellh.ghostty.nload|com.mitchellh.ghostty.wiremix|localsend)
windowrule = tag +floating-window, match:class (org.gnome.FileRoller|pavucontrol|Pavucontrol|org.pulseaudio.pavucontrol|org.gnome.eog|org.gnome.Weather|org.gnome.clocks|org.gnome.Clocks|org.gnome.font-viewer|org.gnome.FontViewer|org.gnome.Logs|galculator|qalculate-gtk|org.gnome.seahorse.Application|gcolor3|xdg-desktop-portal-gtk)
windowrule = tag +floating-window, match:class (org.gnome.baobab|org.gnome.Tecla|org.gnome.Characters|org.gnome.DiskUtility|org.gnome.Cheese|org.gnome.SoundRecorder|ca.desrt.dconf-editor|waypaper|[Ss]olaar|Bitwarden|Authy Desktop)

# Kuro (to-do client): own rules; excluded from floating-window tag so the preset size doesn't override
windowrule = float on, match:class Kuro
windowrule = size 578 927, match:class Kuro
windowrule = move 1247 148, match:class Kuro

# satty: float + center, but override the preset's 875x600 with something roomier for annotation
windowrule = float on, match:class com.gabm.satty
windowrule = center on, match:class com.gabm.satty
windowrule = size 1400 900, match:class com.gabm.satty
windowrule = tag +floating-window, match:class (xdg-desktop-portal-gtk|org.gnome.Nautilus), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)

# KeePassXC: float + decent default size
windowrule = float on, match:class org.keepassxc.KeePassXC
windowrule = center on, match:class org.keepassxc.KeePassXC
windowrule = size 1100 750, match:class org.keepassxc.KeePassXC

# Vorta (Borg backup GUI, Flatpak): float + decent default size
windowrule = float on, match:class com.borgbase.Vorta
windowrule = center on, match:class com.borgbase.Vorta
windowrule = size 1000 600, match:class com.borgbase.Vorta

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Power button opens the power menu (requires HandlePowerKey=ignore in logind.conf.d)
# If the keysym form ever stops firing on a future kernel/xkb update, fall back to `code:116`.
bind = , XF86PowerOff, exec, ~/.config/hypr/scripts/power-menu.sh

# Screenshots (grim + slurp + satty for annotation)
# Region select -> annotate in satty -> save + clipboard
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh region
# Pick a window on the active workspace
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window
# Full focused monitor
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh fullscreen
# Color picker (hex -> clipboard, via hyprpicker)
bind = $mainMod CTRL, Print, exec, hyprpicker -a -n

# Clipboard history (requires cliphist)
bind = $mainMod, B, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Lock screen
bind = $mainMod, L, exec, hyprlock

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = no_maximize
    suppress_event = maximize
    match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
    name = xwayland_nofocus
    no_focus = true
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
}
