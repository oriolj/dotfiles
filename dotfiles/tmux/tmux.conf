set -g status 2
set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 150

set -g @bg-color "#374151"
set -g status-style "bg=#{@bg-color},fg=#000000"
set -g status-left-style "bg=#{@bg-color},fg=#000000"
set -g status-right-style "bg=#{@bg-color},fg=#000000"

set -g status-left "[#S] "
set -g status-right ""

set -g status-format[1] "#[bg=#{@bg-color},fg=#000000,align=right]🖥️  #H | CPU #(~/.tmux/cpu.sh) | RAM #(~/.tmux/ram.sh) | Disk #(~/.tmux/disk.sh) | Claude #(~/.tmux/claude-usage.sh) "

set-hook -g session-created 'run-shell ~/.tmux/init-session-colors.sh'
set-hook -g session-renamed 'run-shell ~/.tmux/init-session-colors.sh'

run-shell '~/.tmux/init-session-colors.sh'
