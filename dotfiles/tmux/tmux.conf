set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- testing ---
set -sg escape-time 0
set -g focus-events on
set -g history-limit 50000
# --- end testing ---

set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 150

set -g @bg-color "#374151"
set -g status-style "bg=#{@bg-color},fg=#000000"
set -g status-left-style "bg=#{@bg-color},fg=#000000"
set -g status-right-style "bg=#{@bg-color},fg=#000000"

set -g status-left "[#S] "
set -g status-right "🖥️  #H | CPU #(~/.tmux/cpu.sh) | Load15 #(~/.tmux/load.sh) | RAM #(~/.tmux/ram.sh) | Disk #(~/.tmux/disk.sh) | 🐳 #(~/.tmux/docker.sh) | %Y-%m-%d %H:%M "

set -g window-status-separator ""
set -g window-status-style "fg=#000000,bg=#{@bg-color}"
set -g window-status-current-style "fg=#111827,bg=#f9fafb,bold"
set -g window-status-format "  #I  #W#F  "
set -g window-status-current-format "#[fg=#f9fafb,bg=#{@bg-color}]#[fg=#111827,bg=#f9fafb,bold] #I  #W#{?window_zoomed_flag, Z,} #[fg=#f9fafb,bg=#{@bg-color}]"
set -g window-status-activity-style "fg=#fbbf24,bg=#{@bg-color}"
set -g window-status-bell-style "fg=#ef4444,bg=#{@bg-color},bold"

set-hook -g session-created 'run-shell ~/.tmux/init-session-colors.sh'
set-hook -g session-renamed 'run-shell ~/.tmux/init-session-colors.sh'

run-shell '~/.tmux/init-session-colors.sh'
