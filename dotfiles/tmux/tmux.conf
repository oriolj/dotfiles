set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- testing ---
set -sg escape-time 0
set -g focus-events on
set -g history-limit 50000
# --- end testing ---

set -g status 2
set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 150

set -g @bg-color "#374151"
set -g status-style "bg=#{@bg-color},fg=#000000"
set -g status-left-style "bg=#{@bg-color},fg=#000000"
set -g status-right-style "bg=#{@bg-color},fg=#000000"

set -g status-left "[#S] "
set -g status-right ""

set -g window-status-separator ""
set -g window-status-style "fg=#000000,bg=#{@bg-color}"
set -g window-status-current-style "fg=#111827,bg=#f9fafb,bold"

# Agent activity emoji: 🔄 = working (title shows an animated braille
# spinner), ✅ = idle / waiting for input (Claude's "✳" marker, or Codex's
# plain project title). Only emitted for claude/codex/node panes.
set -g @agent-state "#{?#{||:#{m:claude,#{pane_current_command}},#{||:#{m:codex,#{pane_current_command}},#{m:node,#{pane_current_command}}}},#{?#{m:✳*,#{pane_title}},✅ ,#{?#{m:[A-Za-z0-9~/]*,#{pane_title}},✅ ,🔄 }},}"
set -g window-status-format " #{E:@agent-state}#I-#{=15:window_name}#F "
set -g window-status-current-format "#[fg=#f9fafb,bg=#{@bg-color}]#[fg=#111827,bg=#f9fafb,bold] #{E:@agent-state}#I-#{=15:window_name}#{?window_zoomed_flag, Z,} #[fg=#f9fafb,bg=#{@bg-color}]"
set -g window-status-activity-style "fg=#fbbf24,bg=#{@bg-color}"
set -g window-status-bell-style "fg=#ef4444,bg=#{@bg-color},bold"

set -g status-format[1] "#[bg=#{@bg-color},fg=#000000,align=right]🖥️  #H | CPU #(~/.tmux/cpu.sh) | RAM #(~/.tmux/ram.sh) | Disk #(~/.tmux/disk.sh) | 🐳 #(~/.tmux/docker.sh) | 🤖 #(/home/oriol/.local/bin/claude-ps --tmux) | #(~/.tmux/claude-usage.sh) "

# Name each window after its pane title. Claude Code sets the title to
# its session name (e.g. "✳ vat-problems"); strip the leading status
# glyph so the animated spinner doesn't churn the window name.
set -g automatic-rename on
set -g automatic-rename-format "#{s/^[^ ]* //:pane_title}"

set-hook -g session-created 'run-shell ~/.tmux/init-session-colors.sh'
set-hook -g session-renamed 'run-shell ~/.tmux/init-session-colors.sh'

run-shell '~/.tmux/init-session-colors.sh'
